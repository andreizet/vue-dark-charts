<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue-dark-charts — Beautiful charts for Vue 3</title>
    <meta name="description" content="Lightweight Vue 3 SVG chart components with zero dependencies. Dark-first, fully themeable, plug and play." />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-base:     #020b18;
        --bg-surface:  #060f20;
        --bg-elevated: #0a1628;
        --bg-overlay:  #0d1e35;
        --accent-primary:   #3b82f6;
        --accent-secondary: #06b6d4;
        --accent-success:   #10b981;
        --accent-warning:   #f59e0b;
        --accent-danger:    #ef4444;
        --text-primary:   #f0f6ff;
        --text-secondary: #94a3b8;
        --text-muted:     #475569;
        --border-subtle:  rgba(255,255,255,0.05);
        --border-default: rgba(255,255,255,0.10);
        --border-glow:    rgba(59,130,246,0.45);
        --glow-blue:    0 0 20px rgba(59,130,246,0.35), 0 0 60px rgba(59,130,246,0.15);
        --glow-cyan:    0 0 20px rgba(6,182,212,0.35),  0 0 60px rgba(6,182,212,0.15);
        --glow-emerald: 0 0 20px rgba(16,185,129,0.35), 0 0 60px rgba(16,185,129,0.15);
        --surface-2: rgba(255,255,255,0.03);
        --glass-bg:     rgba(6,15,32,0.65);
        --glass-border: rgba(255,255,255,0.08);
        --glass-blur:   blur(16px) saturate(180%);
        --font-ui:   'Inter', system-ui, -apple-system, sans-serif;
        --font-code: ui-monospace, 'JetBrains Mono', 'Fira Code', monospace;
        --text-xs:   0.75rem;
        --text-sm:   0.875rem;
        --text-base: 1rem;
        --text-lg:   1.125rem;
        --text-xl:   1.25rem;
        --text-2xl:  1.5rem;
        --text-3xl:  1.875rem;
      }

      .site-shell {
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(59,130,246,0.08), transparent 28%),
          linear-gradient(180deg, var(--bg-base) 0%, var(--bg-surface) 100%);
        color: var(--text-primary);
        transition: background 0.3s ease, color 0.3s ease;
      }

      .site-shell[data-vdc-theme='light'] {
        --bg-base: #eef4fb;
        --bg-surface: #f8fbff;
        --bg-elevated: #e7eef8;
        --bg-overlay: #ffffff;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #64748b;
        --border-subtle: rgba(15,23,42,0.08);
        --border-default: rgba(15,23,42,0.14);
        --border-glow: rgba(59,130,246,0.22);
        --glow-blue: 0 16px 38px rgba(59,130,246,0.12);
        --glow-cyan: 0 16px 38px rgba(6,182,212,0.10);
        --glow-emerald: 0 16px 38px rgba(16,185,129,0.10);
        --surface-2: rgba(255,255,255,0.88);
        --glass-bg: rgba(255,255,255,0.92);
        --glass-border: rgba(148,163,184,0.26);
        --glass-blur: blur(12px) saturate(140%);
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: var(--font-ui);
        font-size: var(--text-base);
        line-height: 1.5;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-base); }
      ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

      .container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
      @media (min-width: 768px) { .container { padding: 0 2rem; } }

      /* NAV */
      .nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        height: 64px; display: flex; align-items: center;
        background: rgba(2,11,24,0.80);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--border-subtle);
        transition: border-color 0.3s, background 0.3s;
      }
      .nav.scrolled { background: rgba(2,11,24,0.96); border-bottom-color: var(--border-default); }
      .site-shell[data-vdc-theme='light'] .nav {
        background: rgba(248,250,252,0.84);
        border-bottom-color: rgba(15,23,42,0.08);
      }
      .site-shell[data-vdc-theme='light'] .nav.scrolled {
        background: rgba(248,250,252,0.96);
        border-bottom-color: rgba(15,23,42,0.12);
      }
      .nav__inner { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 1rem; }
      .nav__logo {
        display: flex; align-items: center; gap: 0.5rem;
        text-decoration: none; color: var(--text-primary);
        font-weight: 700; font-size: var(--text-lg); letter-spacing: -0.02em;
        white-space: nowrap; flex-shrink: 0;
      }
      .nav__logo-icon {
        width: 28px; height: 28px; border-radius: 6px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        display: flex; align-items: center; justify-content: center;
        box-shadow: var(--glow-blue); flex-shrink: 0;
        overflow: hidden;
      }
      .nav__logo-icon svg { width: 16px; height: 16px; color: white; }
      .nav__logo-icon img { width: 100%; height: 100%; display: block; object-fit: cover; }
      .site-shell[data-vdc-theme='light'] .nav__logo-icon {
        background: transparent;
        box-shadow: none;
      }
      .nav__logo-text span { color: var(--accent-secondary); }
      .nav__tabs { display: flex; align-items: center; gap: 0.25rem; }
      .nav__tab {
        padding: 0.375rem 0.875rem; border-radius: 0.375rem;
        color: var(--text-secondary); font-size: var(--text-sm); font-weight: 500;
        cursor: pointer; border: none; background: transparent; font-family: var(--font-ui);
        transition: color 0.2s, background 0.2s;
      }
      .nav__tab:hover { color: var(--text-primary); background: var(--border-subtle); }
      .nav__tab.active { color: var(--accent-secondary); background: rgba(6,182,212,0.08); }
      .nav__actions { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
      .star-btn {
        display: inline-flex; align-items: center; gap: 0.375rem;
        padding: 0.375rem 0.875rem;
        background: rgba(255,255,255,0.05); border: 1px solid var(--border-default);
        border-radius: 0.5rem; color: var(--text-secondary);
        font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 500;
        text-decoration: none; cursor: pointer; transition: all 0.2s; white-space: nowrap;
      }
      .star-btn:hover { background: rgba(59,130,246,0.10); border-color: var(--accent-primary); color: var(--text-primary); box-shadow: var(--glow-blue); }
      .star-btn svg { width: 14px; height: 14px; color: #f59e0b; fill: #f59e0b; transition: transform 0.2s; }
      .star-btn:hover svg { transform: scale(1.2) rotate(-10deg); }
      .theme-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 34px; height: 34px; border-radius: 0.5rem;
        background: rgba(255,255,255,0.05); border: 1px solid var(--border-default);
        color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
      }
      .theme-btn:hover { color: var(--text-primary); border-color: var(--border-default); background: rgba(255,255,255,0.08); }
      .theme-btn svg { width: 16px; height: 16px; }
      .site-shell[data-vdc-theme='light'] .star-btn,
      .site-shell[data-vdc-theme='light'] .theme-btn {
        background: rgba(255,255,255,0.74);
      }
      .site-shell[data-vdc-theme='light'] .nav__tab:hover,
      .site-shell[data-vdc-theme='light'] .theme-btn:hover {
        background: rgba(15,23,42,0.05);
      }
      @media (max-width: 640px) { .nav__tabs { display: none; } }

      /* PAGE */
      .page { padding-top: 64px; }
      .page-section { display: none; }
      .page-section.active { display: block; }

      /* HERO */
      .hero {
        position: relative; min-height: calc(100vh - 64px);
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .hero__bg {
        position: absolute; inset: 0; z-index: 0;
        background-image:
          linear-gradient(rgba(59,130,246,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.035) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      }
      .site-shell[data-vdc-theme='light'] .hero__bg {
        background-image:
          linear-gradient(rgba(59,130,246,0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59,130,246,0.08) 1px, transparent 1px);
        opacity: 0.8;
      }
      .hero__orb {
        position: absolute; border-radius: 50%; filter: blur(80px);
        opacity: 0.22; animation: float 8s ease-in-out infinite; pointer-events: none;
      }
      .hero__orb--blue  { width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%); top: -10%; left: -10%; animation-delay: 0s; }
      .hero__orb--cyan  { width: 500px; height: 500px; background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%); bottom: -5%; right: -5%; animation-delay: -3s; }
      .hero__orb--green { width: 350px; height: 350px; background: radial-gradient(circle, var(--accent-success) 0%, transparent 70%); top: 30%; right: 20%; opacity: 0.14; animation-delay: -6s; }
      .hero__content {
        position: relative; z-index: 1; text-align: center;
        max-width: 1080px; margin: 0 auto; padding: 3rem 1.5rem;
      }
      .hero__eyebrow {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.375rem 1rem;
        background: rgba(59,130,246,0.10); border: 1px solid rgba(59,130,246,0.25);
        border-radius: 9999px; font-size: var(--text-xs); font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-secondary);
        margin-bottom: 1.5rem; animation: fade-in-up 0.6s ease both;
      }
      .hero__dot { width: 6px; height: 6px; background: var(--accent-success); border-radius: 50%; box-shadow: 0 0 8px var(--accent-success); animation: glow-pulse 2s ease-in-out infinite; }
      .hero__heading {
        font-size: clamp(2.4rem, 6vw, 4.5rem); font-weight: 800;
        line-height: 1.15; letter-spacing: -0.03em; color: var(--text-primary);
        margin-bottom: 1.25rem; animation: fade-in-up 0.6s 0.1s ease both;
      }
      .hero__heading .grad {
        background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 50%, var(--accent-success) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }
      .hero__sub {
        font-size: var(--text-lg); color: var(--text-secondary); line-height: 1.65;
        max-width: 560px; margin: 0 auto 2.5rem; animation: fade-in-up 0.6s 0.2s ease both;
      }
      .hero__actions {
        display: flex; align-items: center; justify-content: center;
        gap: 1rem; flex-wrap: wrap; margin-bottom: 3.5rem;
        animation: fade-in-up 0.6s 0.3s ease both;
      }
      .hero__charts {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        max-width: 980px;
        margin: 0 auto;
        animation: fade-in-up 0.8s 0.4s ease both;
      }
      @media (min-width: 900px) {
        .hero__charts {
          grid-template-columns: repeat(12, minmax(0, 1fr));
          grid-auto-rows: 124px;
          align-items: stretch;
        }
      }
      .hero__chart-box {
        --hero-card-accent: var(--accent-primary);
        position: relative;
        min-height: 210px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
          var(--glass-bg);
        backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border); border-radius: 1.15rem;
        overflow: hidden;
        transition: transform 0.32s ease, box-shadow 0.32s ease, border-color 0.32s ease;
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.05),
          0 14px 36px rgba(0,0,0,0.22);
      }
      .hero__chart-box::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top right, color-mix(in srgb, var(--hero-card-accent) 22%, transparent) 0%, transparent 42%),
          linear-gradient(180deg, rgba(255,255,255,0.04), transparent 28%);
        pointer-events: none;
      }
      .hero__chart-box::after {
        content: '';
        position: absolute;
        top: 0;
        left: 1rem;
        right: 1rem;
        height: 1px;
        background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--hero-card-accent) 82%, white) 50%, transparent);
        opacity: 0.8;
        pointer-events: none;
      }
      .hero__chart-box:hover {
        border-color: color-mix(in srgb, var(--hero-card-accent) 32%, var(--glass-border));
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.06),
          0 18px 48px rgba(0,0,0,0.28),
          0 0 0 1px color-mix(in srgb, var(--hero-card-accent) 12%, transparent);
        transform: translateY(-6px) scale(1.015);
      }
      .hero__chart-box--line { --hero-card-accent: #22c55e; }
      .hero__chart-box--bar { --hero-card-accent: #3b82f6; }
      .hero__chart-box--donut { --hero-card-accent: #f97316; }
      .hero__chart-box--radial { --hero-card-accent: #ec4899; }
      .hero__chart-meta {
        width: 100%!important;
        position: absolute;
        top: 1rem;
        left: 1rem;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.32rem;
        text-align: left;
        pointer-events: none;
      }
      .hero__chart-label {
        display: inline-flex;
        align-items: center;
        gap: 0.42rem;
        padding: 0.28rem 0.55rem;
        border-radius: 999px;
        background: rgba(2,11,24,0.34);
        border: 1px solid rgba(255,255,255,0.08);
        color: color-mix(in srgb, var(--hero-card-accent) 74%, white);
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }
      .hero__chart-label::before {
        content: '';
        width: 0.38rem;
        height: 0.38rem;
        border-radius: 999px;
        background: var(--hero-card-accent);
        box-shadow: 0 0 12px color-mix(in srgb, var(--hero-card-accent) 68%, transparent);
      }
      .hero__chart-value {
        color: var(--text-primary);
        font-size: clamp(1.2rem, 2vw, 1.7rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.04em;
      }
      .hero__chart-note {
        color: var(--text-secondary);
        font-size: 0.78rem;
        line-height: 1.45;
        width: 100%;
      }
      .hero__chart-box--bar .hero__chart-meta {
        max-width: 8rem;
      }
      .hero__chart-box--donut .hero__chart-meta {
        max-width: 7.75rem;
      }
      .hero__chart-box--radial .hero__chart-meta {
        top: auto;
        bottom: 1rem;
        max-width: 9.5rem;
      }
      .hero__chart-canvas {
        position: absolute;
        inset: 0;
        z-index: 1;
        padding: 3.9rem 0.5rem 0.5rem;
      }
      .hero__chart-canvas > .vdc-root.vdc-chart {
        min-height: 0;
      }
      .hero__chart-canvas > * {
        width: 100%;
        height: 100%;
      }
      .hero__chart-box--line .hero__chart-canvas {
        padding: 6rem 0.75rem 0.45rem 0.35rem;
      }
      .hero__chart-box--bar .hero__chart-canvas {
        padding: 5.4rem 0.55rem 0.45rem 0.45rem;
      }
      .hero__chart-box--donut .hero__chart-canvas {
        padding: 4.2rem 0.75rem 0.75rem;
      }
      .hero__chart-box--donut .vdc-donut {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }
      .hero__chart-box--donut .vdc-donut-legend {
        display: none;
      }
      .hero__chart-box--radial .hero__chart-canvas {
        padding: 4.35rem 0.3rem 0.45rem 0.3rem;
      }
      .hero__chart-box--bar .hero__chart-note,
      .hero__chart-box--radial .hero__chart-note {
        display: none;
      }
      .hero__chart-box--radial .hero__chart-meta {
        top: 1rem;
        bottom: auto;
        max-width: 9rem;
      }
      @media (max-width: 899px) {
        .hero__chart-note {
          display: none;
        }
        .hero__chart-box--donut .hero__chart-canvas {
          padding: 4.2rem 0.5rem 0.5rem;
        }
        .hero__chart-box--donut .vdc-donut,
        .hero__chart-box--radial .vdc-radial {
          align-items: center;
          justify-items: center;
        }
        .hero__chart-box--radial .hero__chart-meta {
          top: 1rem;
          bottom: auto;
          max-width: 10rem;
        }
        .hero__chart-box--radial .hero__chart-canvas {
          padding: 4.2rem 0.4rem 0.4rem 0.4rem;
        }
      }
      @media (min-width: 900px) {
        .hero__chart-box--line {
          grid-column: 1 / span 5;
          grid-row: 1 / span 2;
        }
        .hero__chart-box--bar {
          grid-column: 6 / span 3;
          grid-row: 1 / span 2;
        }
        .hero__chart-box--donut {
          grid-column: 1 / span 8;
          grid-row: 3 / span 2;
          transform: translateY(-0.3rem);
        }
        .hero__chart-box--radial {
          grid-column: 9 / span 4;
          grid-row: 1 / span 4;
        }
      }
      .hero__chart-box:hover.hero__chart-box--donut {
        transform: translateY(calc(-0.3rem - 6px)) scale(1.015);
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-box {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.95)),
          linear-gradient(135deg, color-mix(in srgb, var(--hero-card-accent) 5%, white), transparent 60%),
          var(--glass-bg);
        border-color: rgba(148,163,184,0.22);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.96),
          inset 0 -1px 0 rgba(148,163,184,0.12),
          0 18px 44px rgba(15,23,42,0.08),
          0 4px 14px color-mix(in srgb, var(--hero-card-accent) 8%, transparent);
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-box::before {
        background:
          radial-gradient(circle at top right, color-mix(in srgb, var(--hero-card-accent) 12%, transparent) 0%, transparent 46%),
          linear-gradient(180deg, rgba(255,255,255,0.76), rgba(255,255,255,0) 32%);
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-box::after {
        background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--hero-card-accent) 42%, white) 50%, transparent);
        opacity: 0.55;
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-box:hover {
        border-color: color-mix(in srgb, var(--hero-card-accent) 26%, rgba(148,163,184,0.3));
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.98),
          inset 0 -1px 0 rgba(148,163,184,0.14),
          0 24px 52px rgba(15,23,42,0.10),
          0 8px 20px color-mix(in srgb, var(--hero-card-accent) 14%, transparent),
          0 0 0 1px color-mix(in srgb, var(--hero-card-accent) 10%, transparent);
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-label {
        background: rgba(255,255,255,0.9);
        border-color: rgba(148,163,184,0.24);
        color: color-mix(in srgb, var(--hero-card-accent) 72%, #0f172a);
        box-shadow: 0 8px 18px rgba(148,163,184,0.12);
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-label::before {
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--hero-card-accent) 12%, transparent);
      }
      .site-shell[data-vdc-theme='light'] .hero__chart-note {
        color: var(--text-secondary);
      }

      /* BUTTONS */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
        padding: 0.625rem 1.375rem; border-radius: 0.5rem;
        font-family: var(--font-ui); font-size: var(--text-sm); font-weight: 600;
        line-height: 1; text-decoration: none; cursor: pointer;
        border: 1px solid transparent; transition: all 0.2s; white-space: nowrap;
      }
      .btn--lg { padding: 0.875rem 2rem; font-size: var(--text-base); border-radius: 0.625rem; }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent-primary) 0%, #2563eb 100%);
        color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      }
      .btn-primary:hover { background: linear-gradient(135deg, #60a5fa 0%, var(--accent-primary) 100%); box-shadow: var(--glow-blue); transform: translateY(-1px); }
      .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border-default); }
      .btn-ghost:hover { color: var(--text-primary); background: var(--border-subtle); }

      /* SECTION */
      .section { padding: 5rem 0; }
      .section--alt { background: linear-gradient(180deg, transparent, rgba(6,182,212,0.02) 50%, transparent); }
      .site-shell[data-vdc-theme='light'] .section--alt {

        mounted() {
          window.addEventListener('scroll', () => {
            this.isScrolled = window.scrollY > 20
          })
          this._initScrollReveal()
        },

        methods: {
          _initScrollReveal() {
            const observer = new IntersectionObserver((entries) => {
              entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view') })
            }, { threshold: 0.1 })
            document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el))
          },
          navigate(section) {
            this.currentSection = section
            window.scrollTo({ top: 0, behavior: 'smooth' })
            this.$nextTick(() => this._initScrollReveal())
          },
          getCardView(id) { return this.cardViews[id] ?? 'preview' },
          setCardView(id, view) { this.cardViews[id] = view },
          async copySnippet(key) {
            const code = this.snippets[key]
            if (!code) return
            try {
              await navigator.clipboard.writeText(code)
              this.copiedSnippet = key
              if (this.copyResetHandle) clearTimeout(this.copyResetHandle)
              this.copyResetHandle = setTimeout(() => { this.copiedSnippet = null }, 1600)
            } catch (e) { console.error('Copy failed', e) }
          },
          async copyInstall() {
            try {
              await navigator.clipboard.writeText('npm install vue-dark-charts')
              this.installCopied = true
              setTimeout(() => { this.installCopied = false }, 1600)
            } catch (e) {}
          },
        },

                        <p class="docs-section__desc">Single or multi-series line chart with smooth curves, hover crosshair, and gradient fill. Use <code style="font-family: var(--font-code); color: var(--accent-secondary); font-size: 0.85em;">points</code> for single-series or <code style="font-family: var(--font-code); color: var(--accent-secondary); font-size: 0.85em;">series</code> for multi-series.</p>
                        <table class="options-table">
                          <thead><tr><th>Prop</th><th>Type</th><th>Default</th><th>Description</th></tr></thead>
                          <tbody>
                            <tr><td>points</td><td><span class="badge badge--arr">ChartPoint[]</span></td><td>—</td><td>Data points for single-series mode</td></tr>
                            <tr><td>series</td><td><span class="badge badge--arr">MultiLineSeries[]</span></td><td>—</td><td>Multiple named series (use instead of points)</td></tr>
                            <tr><td>color</td><td><span class="badge badge--str">string</span></td><td>#3b82f6</td><td>Line color for single-series mode</td></tr>
                            <tr><td>colors</td><td><span class="badge badge--arr">string[]</span></td><td>rainbow</td><td>Colors array for multi-series mode</td></tr>

                      <div class="docs-section" id="doc-types">
                        <h2 class="docs-section__title">Types Reference</h2>
                        <pre class="docs-code">interface ChartPoint        { x: string; y: number }

interface MultiLineSeries   {
  name: string; color?: string; dotted?: boolean; points: ChartPoint[]
}

interface BarDatum          { label: string; value: number; color?: string; gradient?: BarGradient }
interface BarSeries         { name: string; color?: string; gradient?: BarGradient; bars: BarDatum[] }
interface BarGradient       {
  from?: string; to?: string;
  stops?: Array&lt;{ offset: string; color: string }&gt;;
  direction?: 'vertical' | 'horizontal' | 'diagonal'
}

interface DonutSegment      { label: string; value: number; color?: string }
interface RadialRing        { label: string; value: number; max?: number; color?: string }
interface RadarSeries       { name: string; color?: string; fillOpacity?: number; points: ChartPoint[] }</pre>
                      </div>

                      <div class="docs-section" id="doc-theming">
                        <h2 class="docs-section__title">Theming</h2>
                        <p class="docs-section__desc">All components accept a <code style="font-family: var(--font-code); color: var(--accent-secondary); font-size: 0.85em;">theme</code> prop.</p>
                        <table class="options-table">
                          <thead><tr><th>Value</th><th>Behavior</th></tr></thead>
                          <tbody>
                            <tr><td>'dark'</td><td>Forces dark theme regardless of system preference</td></tr>
                            <tr><td>'light'</td><td>Forces light theme</td></tr>
                            <tr><td>'auto'</td><td>Follows OS prefers-color-scheme setting</td></tr>
                          </tbody>
                        </table>
                        <p class="docs-section__desc">Override CSS variables to customize further:</p>
                        <pre class="docs-code">[data-vdc-theme='dark'] {
  --vdc-bg:         #0a0f1e;
  --vdc-surface:    rgba(255, 255, 255, 0.04);
  --vdc-text:       #e2e8f0;
  --vdc-text-muted: #94a3b8;
  --vdc-border:     rgba(148, 163, 184, 0.15);
  --vdc-accent:     #3b82f6;
}</pre>
                      </div>

/&gt;</pre>
