    <style>
      body {
        margin: 0;
      }

      .vdc-demo-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 14px;
        flex-wrap: wrap;
      }

      .vdc-demo-view-switch {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .vdc-demo-action {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.6);
        color: #e2e8f0;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease;
      }

      .vdc-demo-action:hover,
      .vdc-demo-action:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(96, 165, 250, 0.45);
        background: rgba(30, 41, 59, 0.95);
        outline: none;
      }

      .vdc-demo-action.is-active {
        border-color: rgba(96, 165, 250, 0.65);
        background: rgba(37, 99, 235, 0.22);
        color: #dbeafe;
      }

      .vdc-demo-action.is-copied {
        border-color: rgba(74, 222, 128, 0.7);
        background: rgba(22, 163, 74, 0.2);
        color: #dcfce7;
      }

      .vdc-demo-action svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .vdc-demo-action::before,
      .vdc-demo-action::after {
        position: absolute;
        left: 50%;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .vdc-demo-action::before {
        content: '';
        bottom: calc(100% + 2px);
        transform: translate(-50%, 6px);
        border-width: 6px 6px 0;
        border-style: solid;
        border-color: rgba(15, 23, 42, 0.96) transparent transparent transparent;
      }

      .vdc-demo-action::after {
        content: attr(data-tooltip);
        bottom: calc(100% + 10px);
        transform: translate(-50%, 6px);
        padding: 6px 8px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.96);
        color: #e2e8f0;
        font-size: 11px;
        font-weight: 500;
        line-height: 1.2;
        white-space: nowrap;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.32);
        z-index: 2;
      }

      .vdc-demo-action:hover::before,
      .vdc-demo-action:hover::after,
      .vdc-demo-action:focus-visible::before,
      .vdc-demo-action:focus-visible::after {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .vdc-demo-code {
        margin: 14px 0 0;
        padding: 14px 16px;
        border-radius: 14px;
        overflow-x: auto;
        background: rgba(2, 6, 23, 0.9);
        color: #dbeafe;
        font-size: 12px;
        line-height: 1.55;
        font-family:
          ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono,
          Courier New, monospace;
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.18);
        white-space: pre-wrap;
      }

      [data-vdc-theme='light'] .vdc-demo-code {
        background: rgba(226, 232, 240, 0.95);
        color: #0f172a;
        box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      }

      [data-vdc-theme='light'] .vdc-demo-action {
        border-color: rgba(148, 163, 184, 0.45);
        background: rgba(248, 250, 252, 0.92);
        color: #0f172a;
      }

      [data-vdc-theme='light'] .vdc-demo-action:hover,
      [data-vdc-theme='light'] .vdc-demo-action:focus-visible {
        border-color: rgba(59, 130, 246, 0.5);
        background: #ffffff;
      }

      [data-vdc-theme='light'] .vdc-demo-action.is-active {
        border-color: rgba(37, 99, 235, 0.45);
        background: rgba(59, 130, 246, 0.12);
        color: #1d4ed8;
      }

        border-color: rgba(34, 197, 94, 0.45);
        background: rgba(34, 197, 94, 0.12);
        color: #166534;
      }

        border-color: rgba(255, 255, 255, 0.98) transparent transparent transparent;

        background: rgba(255, 255, 255, 0.98);
        color: #0f172a;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);

          },
          getCopyTooltip(snippetKey) {
            return this.copiedSnippet === snippetKey ? 'Code copied to clipboard' : 'Copy code to clipboard'
          },
          async copySnippet(snippetKey) {
            const code = this.snippets[snippetKey]

            if (!code) {
              return
            }

            try {
              if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(code)
              } else {
                const textarea = document.createElement('textarea')
                textarea.value = code
                textarea.setAttribute('readonly', '')
                textarea.style.position = 'fixed'
                textarea.style.opacity = '0'
                textarea.style.pointerEvents = 'none'
                document.body.appendChild(textarea)
                textarea.select()
                document.execCommand('copy')
                document.body.removeChild(textarea)
              }

              this.copiedSnippet = snippetKey

              if (this.copyResetHandle) {
                window.clearTimeout(this.copyResetHandle)
              }

              this.copyResetHandle = window.setTimeout(() => {
                this.copiedSnippet = null
                this.copyResetHandle = null
